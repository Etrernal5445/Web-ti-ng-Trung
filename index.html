<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Viết Từ Vựng Tiếng Trung</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        /* Cấu hình giao diện nền tối */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #263238; /* Nền xanh đen tối */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .game-board {
            background-color: #1c262b; /* Nền xám đen cho bảng game */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 650px;
        }
        
        h2 {
            color: #eceff1;
            margin-bottom: 25px;
        }
        
        #viet-word {
            color: #e74c3c;
            font-size: 32px;
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        
        #canvas-wrapper {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .char-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Ô vẽ chữ nền sáng để dễ nhìn nét mực đen */
        .char-box {
            width: 150px;
            height: 150px;
            background-color: #f5f6fa;
            border: 3px dashed #7f8fa6;
            border-radius: 8px;
            cursor: crosshair;
        }
        
        .locked {
            opacity: 0.15;
            pointer-events: none;
        }

        .pinyin-display {
            margin-top: 12px;
            font-size: 22px;
            font-weight: bold;
            color: #f39c12;
            min-height: 26px;
            opacity: 0; 
            transition: opacity 0.4s ease; 
        }

        .pinyin-show {
            opacity: 1;
        }

        #effect-message {
            font-weight: bold;
            color: #2ecc71;
            height: 24px;
            margin-bottom: 25px;
            font-size: 18px;
        }
        
        /* Tùy chỉnh nút bấm */
        button {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-skill {
            background-color: #9b59b6; /* Màu tím cho kỹ năng */
        }
        
        .btn-skill:hover {
            background-color: #8e44ad;
        }

        .btn-next {
            background-color: #3498db; /* Màu xanh dương cho nút tiếp theo */
        }

        .btn-next:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="game-board">
        <h2>Hãy viết từ:<br><span id="viet-word">...</span></h2>
        
        <div id="canvas-wrapper"></div>
        
        <div id="effect-message">Dùng ngón tay/chuột để viết nét chữ!</div>
        
        <button class="btn-skill" onclick="useHintSkill()">Tham khảo</button>
        <button class="btn-next" onclick="nextWord()">Câu tiếp theo</button>
    </div>

    <script>
        const vocabList = [
            { vn: "Xin chào", cn: "你好", pinyin: ["nǐ", "hǎo"] },
            { vn: "Bạn, anh, chị", cn: "你", pinyin: ["nǐ"] },
            { vn: "Em gái của bạn", cn: "你妹妹", pinyin: ["nǐ", "mèi", "mei"] },
            { vn: "Cảm ơn", cn: "谢谢", pinyin: ["xiè", "xiè"] },
            { vn: "Tạm biệt", cn: "再见", pinyin: ["zài", "jiàn"] },
            { vn: "Khỏe, tốt", cn: "好", pinyin: ["hǎo"] },
            { vn: "Ông, bà ,ngài", cn: "您", pinyin: ["nín"] },
            { vn: "Chào ông, bà", cn: "您好", pinyin: ["nín", "hǎo"] },
            { vn: "Người tốt", cn: "好人", pinyin: ["hǎo", "rén"] },
            { vn: "Không tốt", cn: "不好", pinyin: ["bù", "hǎo"] }
        ];

        let currentIndex = 0;
        let writers = [];
        let currentWordData = {};

        function loadGame() {
            currentWordData = vocabList[currentIndex];
            document.getElementById('viet-word').innerText = currentWordData.vn;
            
            const msg = document.getElementById('effect-message');
            msg.innerText = "Bắt đầu viết chữ đầu tiên...";
            msg.style.color = "#bdc3c7";
            
            const wrapper = document.getElementById('canvas-wrapper');
            wrapper.innerHTML = ""; 
            writers = [];

            const chars = currentWordData.cn.split('');
            
            chars.forEach((char, index) => {
                let colDiv = document.createElement('div');
                colDiv.className = 'char-column';

                let charDiv = document.createElement('div');
                charDiv.id = `char-${index}`;
                charDiv.className = 'char-box';
                if (index > 0) charDiv.classList.add('locked');

                let pinyinDiv = document.createElement('div');
                pinyinDiv.id = `pinyin-${index}`;
                pinyinDiv.className = 'pinyin-display';
                pinyinDiv.innerText = currentWordData.pinyin[index];

                colDiv.appendChild(charDiv);
                colDiv.appendChild(pinyinDiv);
                wrapper.appendChild(colDiv);

                let writer = HanziWriter.create(`char-${index}`, char, {
                    width: 150,
                    height: 150,
                    padding: 10,
                    showCharacter: false,
                    showOutline: false,
                    strokeAnimationSpeed: 2,
                    delayBetweenStrokes: 50,
                });
                
                writers.push(writer);
            });

            startQuizForChar(0);
        }

        function startQuizForChar(index) {
            if (index >= writers.length) {
                const msg = document.getElementById('effect-message');
                msg.style.color = "#2ecc71";
                msg.innerText = "Trạng thái: Hoàn Mỹ! (+100 Điểm)";
                return;
            }

            document.getElementById(`char-${index}`).classList.remove('locked');

            writers[index].quiz({
                onComplete: function() {
                    document.getElementById(`pinyin-${index}`).classList.add('pinyin-show');
                    startQuizForChar(index + 1);
                }
            });
        }

        function useHintSkill() {
            document.getElementById('effect-message').innerText = "Muốn giỏi bớt dùng";
            document.getElementById('effect-message').style.color = "#9b59b6";
            
            writers.forEach(writer => {
                writer.cancelQuiz();
                writer.animateCharacter();
            });

            setTimeout(() => {
                document.getElementById('effect-message').innerText = "Hãy viết lại nào!";
                document.getElementById('effect-message').style.color = "#bdc3c7";
                loadGame();
            }, 3500);
        }

        function nextWord() {
            let oldIndex = currentIndex;
            while (currentIndex === oldIndex) {
                currentIndex = Math.floor(Math.random() * vocabList.length);
            }
            loadGame();
        }

        loadGame();
    </script>
</body>
</html>
