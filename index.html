<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Viết Từ Vựng Tiếng Trung</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .game-board {
            background-color: #ecf0f1;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }
        h2 {
            color: #34495e;
            margin-bottom: 20px;
        }
        #viet-word {
            color: #e74c3c;
            font-size: 28px;
            font-weight: bold;
        }
        
        #canvas-wrapper {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        /* Cột chứa cả ô chữ và phần phiên âm bên dưới */
        .char-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .char-box {
            width: 150px;
            height: 150px;
            background-color: #fff;
            border: 3px dashed #bdc3c7;
            border-radius: 8px;
            cursor: crosshair;
        }
        
        .locked {
            opacity: 0.3;
            pointer-events: none;
        }

        /* Khung hiển thị phiên âm */
        .pinyin-display {
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #e67e22;
            min-height: 24px;
            opacity: 0; /* Ẩn đi lúc ban đầu */
            transition: opacity 0.4s ease; /* Hiệu ứng hiện ra từ từ */
        }

        /* Khi thêm class này vào, phiên âm sẽ hiện ra */
        .pinyin-show {
            opacity: 1;
        }

        #effect-message {
            font-weight: bold;
            color: #27ae60;
            height: 24px;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-skill {
            background-color: #9b59b6;
        }
        .btn-skill:hover {
            background-color: #8e44ad;
        }
    </style>
</head>
<body>

    <div class="game-board">
        <h2>Hãy viết từ:<br><span id="viet-word">...</span></h2>
        
        <div id="canvas-wrapper"></div>
        
        <div id="effect-message">Dùng ngón tay/chuột để viết nét chữ!</div>
        
        <button class="btn-skill" onclick="useHintSkill()">Kỹ Năng: Thấu Thị</button>
        <button onclick="nextWord()">Câu tiếp theo</button>
    </div>

    <script>
        // Bổ sung thêm mảng 'pinyin' (phiên âm) tương ứng với từng chữ Hán
        const vocabList = [
            { vn: "Xin chào", cn: "你好", pinyin: ["nǐ", "hǎo"] },
            { vn: "Cảm ơn", cn: "谢谢", pinyin: ["xiè", "xiè"] },
            { vn: "Tạm biệt", cn: "再见", pinyin: ["zài", "jiàn"] },
            { vn: "Sinh viên", cn: "大学生", pinyin: ["dà", "xué", "shēng"] }
        ];

        let currentIndex = 0;
        let writers = [];
        let currentWordData = {};

        function loadGame() {
            currentWordData = vocabList[currentIndex];
            document.getElementById('viet-word').innerText = currentWordData.vn;
            const msg = document.getElementById('effect-message');
            msg.innerText = "Bắt đầu viết chữ đầu tiên...";
            msg.style.color = "#7f8c8d";
            
            const wrapper = document.getElementById('canvas-wrapper');
            wrapper.innerHTML = ""; 
            writers = [];

            const chars = currentWordData.cn.split('');
            
            chars.forEach((char, index) => {
                // Tạo cột chứa chữ và phiên âm
                let colDiv = document.createElement('div');
                colDiv.className = 'char-column';

                // Tạo ô vẽ chữ
                let charDiv = document.createElement('div');
                charDiv.id = `char-${index}`;
                charDiv.className = 'char-box';
                if (index > 0) charDiv.classList.add('locked');

                // Tạo ô chứa phiên âm
                let pinyinDiv = document.createElement('div');
                pinyinDiv.id = `pinyin-${index}`;
                pinyinDiv.className = 'pinyin-display';
                pinyinDiv.innerText = currentWordData.pinyin[index]; // Gắn sẵn phiên âm nhưng đang bị ẩn

                colDiv.appendChild(charDiv);
                colDiv.appendChild(pinyinDiv);
                wrapper.appendChild(colDiv);

                let writer = HanziWriter.create(`char-${index}`, char, {
                    width: 150,
                    height: 150,
                    padding: 10,
                    showCharacter: false,
                    showOutline: false,
                    strokeAnimationSpeed: 2,
                    delayBetweenStrokes: 50,
                });
                
                writers.push(writer);
            });

            startQuizForChar(0);
        }

        function startQuizForChar(index) {
            if (index >= writers.length) {
                const msg = document.getElementById('effect-message');
                msg.style.color = "#27ae60";
                msg.innerText = "Hiệu Ứng: Hoàn Mỹ! (+100 Điểm)";
                return;
            }

            document.getElementById(`char-${index}`).classList.remove('locked');

            writers[index].quiz({
                onComplete: function() {
                    // Ngay khi viết đúng, gọi class hiển thị phiên âm lên
                    document.getElementById(`pinyin-${index}`).classList.add('pinyin-show');
                    
                    // Tiếp tục mở khóa chữ tiếp theo
                    startQuizForChar(index + 1);
                }
            });
        }

        function useHintSkill() {
            document.getElementById('effect-message').innerText = "Đã kích hoạt Kỹ Năng: Thấu Thị!";
            document.getElementById('effect-message').style.color = "#9b59b6";
            
            writers.forEach(writer => {
                writer.cancelQuiz();
                writer.animateCharacter();
            });

            setTimeout(() => {
                document.getElementById('effect-message').innerText = "Hãy vẽ lại nào!";
                loadGame();
            }, 3500);
        }

        function nextWord() {
            currentIndex = Math.floor(Math.random() * vocabList.length);
            loadGame();
        }

        loadGame();
    </script>

</body>
</html>
