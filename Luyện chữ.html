<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện Viết Chữ Hán</title>
    <!-- Nhúng thư viện Hanzi Writer -->
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-board {
            background-color: #ecf0f1;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }
        h2 {
            color: #34495e;
            margin-bottom: 20px;
        }
        #viet-word {
            color: #e74c3c;
            font-size: 28px;
            font-weight: bold;
        }
        /* Khung vẽ chữ */
        #canvas-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px auto;
            background-color: #fff;
            border: 3px dashed #bdc3c7;
            border-radius: 8px;
            cursor: crosshair;
        }
        #effect-message {
            font-weight: bold;
            color: #27ae60;
            height: 24px;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-skill {
            background-color: #9b59b6;
        }
        .btn-skill:hover {
            background-color: #8e44ad;
        }
    </style>
</head>
<body>

    <div class="game-board">
        <h2>Hãy viết chữ:<br><span id="viet-word">...</span></h2>
        
        <!-- Bảng để vẽ chữ bằng chuột -->
        <div id="canvas-container"></div>
        
        <div id="effect-message">Dùng chuột để viết nét chữ!</div>
        
        <!-- Các nút chức năng -->
        <button class="btn-skill" onclick="useHintSkill()">Muốn giỏi đừng dùng</button>
        <button onclick="nextWord()">Câu tiếp theo</button>
    </div>

    <script>
        // Ngân hàng từ vựng (Lưu ý: Hanzi Writer hoạt động tốt nhất với từng chữ đơn)
        const vocabList = [
            { vn: "nǐ", cn: "你" },
            { vn: "hǎo", cn: "好" },
            { vn: "nín", cn: "您" },
			{ vn: "Người", cn: "人" },
            { vn: "Mộc (Cây)", cn: "木" }
        ];

        let currentIndex = 0;
        let writer;

        function loadGame() {
            const currentWord = vocabList[currentIndex];
            document.getElementById('viet-word').innerText = currentWord.vn;
            document.getElementById('effect-message').innerText = "Đang chờ nét bút...";
            document.getElementById('effect-message').style.color = "#7f8c8d";
            
            // Xóa bảng vẽ cũ
            document.getElementById('canvas-container').innerHTML = ""; 

            // Khởi tạo Hanzi Writer
            writer = HanziWriter.create('canvas-container', currentWord.cn, {
                width: 200,
                height: 200,
                padding: 10,
                showCharacter: false, // Ẩn chữ đi để người chơi tự nhớ
                showOutline: false,   // Ẩn cả viền mờ
                strokeAnimationSpeed: 2,
                delayBetweenStrokes: 50,
            });

            // Kích hoạt chế độ vẽ (Quiz)
            writer.quiz({
                onComplete: function(summaryData) {
                    const msg = document.getElementById('effect-message');
                    msg.style.color = "#27ae60";
                    msg.innerText = "Hiệu ứng: Hoàn Mỹ! (+50 Điểm)";
                }
            });
        }

        // Kỹ năng gợi ý
        function useHintSkill() {
            document.getElementById('effect-message').innerText = "Dùng ít thôi";
            document.getElementById('effect-message').style.color = "#9b59b6";
            // Vẽ mẫu cho người chơi xem
            writer.animateCharacter();
            // Khởi động lại bài quiz sau khi xem xong
            setTimeout(() => {
                writer.quiz();
                document.getElementById('effect-message').innerText = "Hãy vẽ lại nào!";
            }, 3000);
        }

        // Chuyển từ
        function nextWord() {
            currentIndex = Math.floor(Math.random() * vocabList.length);
            loadGame();
        }

        // Bắt đầu game khi mở trang
        loadGame();
    </script>

</body>
</html>
